name: next_talk
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.5


dependencies:
  flutter:
    sdk: flutter

  flutter_screenutil: ^5.9.3
  hugeicons: ^1.1.7
  go_router: ^17.2.0
  flutter_riverpod: ^2.6.1
  fluttertoast: ^9.1.0
  pretty_dio_logger: ^1.4.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4


  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"



  flutter_lints: ^6.0.0



flutter:

  uses-material-design: true

  assets:
    - assets/images/


  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/outfit/Outfit-Thin.ttf
          weight: 200
        - asset: assets/fonts/outfit/Outfit-Light.ttf
          weight: 300
        - asset: assets/fonts/outfit/Outfit-Regular.ttf
          weight: 400
        - asset: assets/fonts/outfit/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/outfit/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/outfit/Outfit-Bold.ttf
          weight: 700
        - asset: assets/fonts/outfit/Outfit-ExtraBold.ttf
          weight: 800
